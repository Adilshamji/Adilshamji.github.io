{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ if .Params.showPosts }}
    {{ partial "posts.html" . }}
  {{ else }}
    <ul>
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  {{ end }}
  {{ if .Parent }}
    <hr>
    <p>🔙 <a href="{{ .Parent.RelPermalink }}">Back to {{ .Parent.Title }}</a></p>
  {{ else }}
    <hr>
    <p>🏠 <a href="/">Back to Homepage</a></p>
  {{ end }}
{{ end }}
