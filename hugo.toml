baseURL = "https://adilshamji.github.io/"
languageCode = "en-us"
title = "Adil Shamji"
theme = "etch"
# For syntax highlighting
pygmentsCodeFences = true
pygmentsUseClasses = true

[params]
  description = "Adil Shamji"
  copyright = "Copyright © 2025 Adil Shamji"
  dark = "off"
  grey = "off"
  latex = "on"
  mainSections = ["posts"]
  paginate = 5
  showDescription = true
  showReadingTime = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
